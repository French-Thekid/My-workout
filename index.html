<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0a0a0a" />
<title>Iron Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --background:0 0% 98%;--foreground:0 0% 4%;--card:0 0% 100%;--border:0 0% 89%;
    --primary:16 100% 50%;--primary-foreground:0 0% 100%;--secondary:0 0% 94%;
    --muted:0 0% 94%;--muted-foreground:0 0% 42%;--success:142 72% 38%;--success-foreground:0 0% 100%;
    --destructive:0 84% 60%;--radius:0.75rem;
  }
  html.dark{
    --background:0 0% 3%;--foreground:0 0% 98%;--card:0 0% 7%;--border:0 0% 14%;
    --primary:16 100% 52%;--primary-foreground:0 0% 100%;--secondary:0 0% 13%;
    --muted:0 0% 13%;--muted-foreground:0 0% 62%;--success:142 68% 45%;--success-foreground:0 0% 4%;
    --destructive:0 72% 51%;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;
    background:hsl(var(--background));color:hsl(var(--foreground));
    -webkit-font-smoothing:antialiased;overscroll-behavior-y:none;
  }
  input{font-family:inherit;}
  .app{position:relative;margin:0 auto;width:100%;max-width:448px;min-height:100vh;background:hsl(var(--background));padding-bottom:76px;overflow-x:hidden;}
  .display{font-family:'Bebas Neue',sans-serif;letter-spacing:.02em;}
  .eyebrow{font-size:11px;letter-spacing:.3em;text-transform:uppercase;font-weight:700;color:hsl(var(--primary));}
  .muted{color:hsl(var(--muted-foreground));}
  ::selection{background:hsl(var(--primary));color:hsl(var(--primary-foreground));}
  .no-sb::-webkit-scrollbar{display:none;}
  .no-sb{-ms-overflow-style:none;scrollbar-width:none;}
  svg{display:block;}

  /* nav */
  nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:448px;z-index:50;
    border-top:1px solid hsl(var(--border));background:hsl(var(--background)/.8);backdrop-filter:blur(24px);}
  .nav-grid{display:grid;grid-template-columns:repeat(4,1fr);height:68px;}
  .nav-btn{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:none;cursor:pointer;color:hsl(var(--muted-foreground));}
  .nav-btn .lbl{font-size:10px;font-weight:700;}
  .nav-btn.active{color:hsl(var(--primary));}
  .nav-btn .bar{position:absolute;top:0;height:3px;width:32px;border-radius:99px;background:hsl(var(--primary));opacity:0;transition:opacity .2s;}
  .nav-btn.active .bar{opacity:1;}
  .nav-btn.active svg{transform:translateY(-2px);}
  .nav-btn svg{transition:transform .2s;}

  /* hero */
  .hero{position:relative;height:256px;width:100%;overflow:hidden;border-bottom-left-radius:2rem;border-bottom-right-radius:2rem;}
  .hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .hero .ov{position:absolute;inset:0;background:linear-gradient(to top,#000,rgba(0,0,0,.5),rgba(0,0,0,.2));}
  .hero .top{position:absolute;top:20px;left:20px;right:20px;display:flex;justify-content:space-between;align-items:flex-start;}
  .hero .bot{position:absolute;bottom:20px;left:20px;right:20px;}
  .hero h1{font-size:60px;line-height:.9;text-transform:uppercase;color:#fff;}

  .px{padding-left:16px;padding-right:16px;}
  .ring-wrap{border-radius:99px;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);padding:4px;}

  .card{border-radius:16px;border:1px solid hsl(var(--border));background:hsl(var(--card));padding:16px;}
  .card.done{border-color:hsl(var(--success)/.4);background:hsl(var(--success)/.06);}
  .ex-head{display:flex;align-items:center;gap:8px;}
  .ex-name{font-weight:700;font-size:15px;line-height:1.1;}
  .ex-target{font-size:12px;margin-top:4px;margin-left:24px;color:hsl(var(--muted-foreground));}
  .prev-hint{display:flex;align-items:center;gap:6px;margin:12px 0;margin-left:24px;font-size:11px;font-weight:600;color:hsl(var(--primary)/.9);}
  .prev-hint .v{color:hsl(var(--muted-foreground));}
  .setrow{display:flex;align-items:center;gap:8px;margin-top:8px;}
  .setnum{width:24px;text-align:center;font-family:'Bebas Neue';font-size:20px;color:hsl(var(--muted-foreground));}
  .setrow input{width:100%;height:44px;border-radius:8px;border:none;background:hsl(var(--secondary));text-align:center;font-weight:700;font-size:16px;color:hsl(var(--foreground));outline:none;}
  .setrow input:focus{box-shadow:0 0 0 2px hsl(var(--primary));}
  .setrow input::placeholder{color:hsl(var(--muted-foreground)/.5);font-weight:600;}
  .setcell{flex:1;}
  .xsign{color:hsl(var(--muted-foreground));font-size:12px;font-weight:700;}
  .checkbtn{height:44px;width:44px;flex-shrink:0;border-radius:8px;border:none;display:flex;align-items:center;justify-content:center;background:hsl(var(--secondary));color:hsl(var(--muted-foreground));cursor:pointer;transition:transform .12s;}
  .checkbtn:active{transform:scale(.9);}
  .checkbtn.on{background:hsl(var(--success));color:hsl(var(--success-foreground));}
  .simplebtn{width:100%;height:48px;border-radius:12px;border:none;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;background:hsl(var(--secondary));color:hsl(var(--foreground));cursor:pointer;transition:transform .12s;}
  .simplebtn:active{transform:scale(.98);}
  .simplebtn.on{background:hsl(var(--success));color:hsl(var(--success-foreground));}
  .breakbtn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 0;border-radius:12px;border:1px dashed hsl(var(--primary)/.4);background:none;color:hsl(var(--primary));font-weight:700;font-size:14px;cursor:pointer;transition:transform .12s;}
  .breakbtn:active{transform:scale(.98);}
  .stack{display:flex;flex-direction:column;gap:12px;}

  .banner{margin-bottom:20px;border-radius:16px;background:hsl(var(--success)/.1);border:1px solid hsl(var(--success)/.3);padding:16px;display:flex;align-items:center;gap:12px;}
  .banner .t{font-weight:700;color:hsl(var(--success));}
  .banner .s{font-size:12px;color:hsl(var(--muted-foreground));}

  /* rest timer */
  .overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);backdrop-filter:blur(16px);padding:24px;}
  .timer-num{font-family:'Bebas Neue';line-height:1;color:#fff;font-size:clamp(6rem,30vw,10rem);}
  .timer-num.danger{color:hsl(var(--destructive));}
  .timer-num.done{color:hsl(var(--success));}
  .timer-actions{display:flex;gap:12px;margin-top:32px;}
  .timer-actions button{flex:1;height:56px;border-radius:12px;border:none;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:transform .12s;}
  .timer-actions button:active{transform:scale(.95);}
  .btn-ghost{background:rgba(255,255,255,.1);color:#fff;}
  .btn-primary{background:hsl(var(--primary));color:hsl(var(--primary-foreground));}

  /* week */
  .pill{flex-shrink:0;height:64px;width:56px;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:1px solid hsl(var(--border));background:hsl(var(--card));cursor:pointer;transition:transform .1s;}
  .pill:active{transform:scale(.95);}
  .pill.active{background:hsl(var(--primary));border-color:hsl(var(--primary));color:hsl(var(--primary-foreground));}
  .pill .d{font-family:'Bebas Neue';font-size:24px;line-height:1;}
  .dot{width:6px;height:6px;border-radius:99px;background:hsl(var(--primary));}
  .pill.active .dot{background:hsl(var(--primary-foreground));}
  .wk-hero{position:relative;height:160px;border-radius:16px;overflow:hidden;margin-bottom:16px;}
  .wk-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .wk-hero .ov{position:absolute;inset:0;background:linear-gradient(to top,#000,rgba(0,0,0,.2));}
  .wk-hero .cap{position:absolute;bottom:16px;left:16px;}
  .wk-hero h2{font-family:'Bebas Neue';font-size:36px;text-transform:uppercase;color:#fff;line-height:1;}
  .exrow{display:flex;align-items:center;justify-content:space-between;border-radius:12px;background:hsl(var(--card));border:1px solid hsl(var(--border));padding:12px 16px;}
  .exrow .l{display:flex;align-items:center;gap:12px;min-width:0;}
  .exrow .n{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .exrow .r{font-size:12px;color:hsl(var(--muted-foreground));font-weight:700;flex-shrink:0;margin-left:12px;}
  .breaklabel{display:flex;align-items:center;gap:8px;padding:8px 0 8px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:hsl(var(--primary)/.7);}

  /* history */
  .statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px;}
  .stat{border-radius:16px;background:hsl(var(--card));border:1px solid hsl(var(--border));padding:16px;display:flex;flex-direction:column;gap:4px;}
  .stat .v{font-family:'Bebas Neue';font-size:36px;line-height:1;margin-top:4px;}
  .stat .l{font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;color:hsl(var(--muted-foreground));}
  .wkgrid{border-radius:16px;background:hsl(var(--card));border:1px solid hsl(var(--border));padding:16px;margin-top:12px;}
  .wkgrid .row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  .wkgrid .col{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .wkgrid .dl{font-size:12px;font-weight:700;color:hsl(var(--muted-foreground));}
  .circle{width:40px;height:40px;border-radius:99px;display:flex;align-items:center;justify-content:center;border:2px solid hsl(var(--border));color:hsl(var(--muted-foreground));}
  .circle.on{background:hsl(var(--success));border-color:hsl(var(--success));color:hsl(var(--success-foreground));}
  .hitem{display:flex;align-items:center;justify-content:space-between;border-radius:12px;background:hsl(var(--card));border:1px solid hsl(var(--border));padding:12px 16px;}
  .badge{font-size:10px;font-weight:700;text-transform:uppercase;padding:4px 8px;border-radius:99px;background:hsl(var(--secondary));color:hsl(var(--muted-foreground));}
  .badge.on{background:hsl(var(--success)/.15);color:hsl(var(--success));}

  /* settings */
  .toggle{position:relative;width:64px;height:36px;border-radius:99px;border:none;cursor:pointer;background:hsl(var(--secondary));transition:background .3s;}
  .toggle.on{background:hsl(var(--primary));}
  .toggle .knob{position:absolute;top:4px;height:28px;width:28px;border-radius:99px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;color:hsl(var(--primary));transition:left .25s cubic-bezier(.4,0,.2,1);left:4px;}
  .toggle.on .knob{left:32px;}

  /* toast */
  #toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-120%);z-index:200;max-width:400px;width:calc(100% - 32px);background:hsl(var(--card));border:1px solid hsl(var(--success)/.4);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 10px 30px rgba(0,0,0,.3);transition:transform .35s cubic-bezier(.4,0,.2,1);}
  #toast.show{transform:translateX(-50%) translateY(0);}
  #toast .tt{font-weight:700;font-size:14px;}
  #toast .ts{font-size:12px;color:hsl(var(--muted-foreground));}

  .fade{animation:fade .3s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .pop{animation:pop 1s infinite;}
  @keyframes pop{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
</style>
</head>
<body>
<div class="app">
  <div id="view"></div>
  <nav>
    <div class="nav-grid" id="nav"></div>
  </nav>
</div>
<div id="toast"><span id="toast-icon"></span><div><div class="tt" id="toast-title"></div><div class="ts" id="toast-sub"></div></div></div>

<script>
/* ---------------- ICONS ---------------- */
const PATHS = {
  dumbbell:'<path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/>',
  calendar:'<rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/>',
  flame:'<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>',
  settings:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  timer:'<path d="M10 2h4M12 14l3-3"/><circle cx="12" cy="14" r="8"/>',
  trophy:'<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2Z"/>',
  plus:'<path d="M5 12h14M12 5v14"/>',
  x:'<path d="M18 6 6 18M6 6l12 12"/>',
  trendingUp:'<path d="M16 7h6v6"/><path d="m22 7-8.5 8.5-5-5L2 17"/>',
  moon:'<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>',
  sun:'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>',
  waves:'<path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>',
  heart:'<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>',
};
function icon(name,size=20,cls=''){return `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="${size}" height="${size}">${PATHS[name]}</svg>`;}

/* ---------------- DATA / PLAN ---------------- */
const IMG={
  chest:'https://images.unsplash.com/photo-1532029837206-abbe2b7620e3?crop=entropy&cs=srgb&fm=jpg&q=85&w=1200',
  back:'https://images.unsplash.com/photo-1526506118085-60ce8714f8c5?crop=entropy&cs=srgb&fm=jpg&q=85&w=1200',
  legs:'https://images.unsplash.com/photo-1646495001290-39103b31873a?crop=entropy&cs=srgb&fm=jpg&q=85&w=1200',
  rest:'https://images.pexels.com/photos/14289784/pexels-photo-14289784.jpeg?auto=compress&cs=tinysrgb&w=1200',
};
const ex=(name,sets,target,kind='exercise')=>({name,sets,target,kind});
const brk=()=>({name:'Short Break',sets:0,target:'Rest & recover',kind:'break'});
const DAY_NAMES=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const SHORT=['M','T','W','T','F','S','S'];
const PLAN=[
 {title:'Chest + Triceps',focus:'Push Power',muscle:'chest',image:IMG.chest,exercises:[
   ex('Pull Ups',1,'30 reps'),ex('Flat Barbell Bench',3,'10-15 reps'),ex('Incline Barbell Bench',3,'10-15 reps'),
   ex('Chest Fly Machine',3,'15 reps'),ex('Chest Dips (lean forward)',3,'To Failure'),brk(),
   ex('Double Arm Push Down (metal)',3,'10-15 reps'),ex('Overhead Push Up',3,'10-15 reps'),ex('Single Arm Push Down',3,'10-15 reps'),brk(),
   ex('Incline Treadmill',1,'15 min @ 3.5mph','cardio')]},
 {title:'Back + Biceps',focus:'Pull Strength',muscle:'back',image:IMG.back,exercises:[
   ex('Pull Ups',1,'50 reps'),ex('Machine Rows',3,'10-15 reps'),ex('Lat Pull Down (wide)',3,'10-15 reps'),
   ex('Lat Pull Down (narrow)',3,'10-15 reps'),ex('Chest Supported Rows',3,'15 reps'),brk(),
   ex('Traps Shrugs',3,'10-15 reps'),ex('Face Pulls',3,'10-15 reps'),brk(),
   ex('Barbell / Dumbbell Curls',3,'10-15 reps'),ex('Incline Seated Dumbbell Curl',3,'10-15 reps'),
   ex('Hammer Curl',3,'10-15 reps'),ex('Concentration Curls',3,'10-15 reps'),brk(),
   ex('Incline Treadmill',1,'15 min @ 3.5mph','cardio')]},
 {title:'Shoulders + Legs + Core',focus:'Full Engine',muscle:'legs',image:IMG.legs,exercises:[
   ex('Pull Ups',1,'30 reps'),ex('Shoulder Press',3,'10-15 reps'),ex('Lateral Raises',3,'10-15 reps'),
   ex('Frontal Raises',3,'10-15 reps'),ex('Shrugs',3,'15 reps'),ex('Face Pulls',3,'15 reps'),brk(),
   ex('Squats',3,'10-15 reps'),ex('Leg Press',3,'10-15 reps'),ex('Leg Raises',3,'10-15 reps'),ex('Hamstring Curl',3,'10-15 reps'),brk(),
   ex('Declined Bench Sit Ups',3,'10-15 reps'),ex('Hanging / Laying Leg Raises',3,'10-15 reps'),
   ex('Cable Crunches',3,'10-15 reps'),ex('Planks',3,'1 min'),ex('Jumping Jacks',1,'300 reps','cardio')]},
 {title:'Chest + Triceps',focus:'Push Power',muscle:'chest',image:IMG.chest,exercises:[
   ex('Pull Ups',1,'30 reps'),ex('Incline Dumbbell Bench',3,'10-15 reps'),ex('Chest Fly Machine',3,'15 reps'),
   ex('Cable Fly (high-to-low)',3,'10-15 reps'),ex('Chest Dips (lean forward)',3,'To Failure'),brk(),
   ex('Double Arm Push Down (metal)',3,'10-15 reps'),ex('Overhead Arm Push Up',3,'10-15 reps'),
   ex('Single Arm Push Down',3,'10-15 reps'),ex('Machine Arm Push Down',3,'10-15 reps'),brk(),
   ex('Incline Treadmill',1,'15 min @ 3.5mph','cardio')]},
 {title:'Back + Biceps',focus:'Pull Strength',muscle:'back',image:IMG.back,exercises:[
   ex('Pull Ups',1,'50 reps'),ex('Deadlift',3,'10 reps'),ex('Lat Pull Down (wide)',3,'10-15 reps'),
   ex('Lat Pull Down (narrow)',3,'10-15 reps'),ex('Seated Row',3,'10-15 reps'),ex('Machine Pullovers',3,'15 reps'),brk(),
   ex('Preacher Curls',3,'10-15 reps'),ex('Cable Curls',3,'10-15 reps'),ex('Hammer Curls',3,'10-15 reps'),
   ex('Wrist Curls',3,'10-15 reps'),ex('Reverse Wrist Curls',3,'10-15 reps'),brk(),
   ex('Incline Treadmill',1,'15 min @ 3.5mph','cardio')]},
 {title:'Rest Day',focus:'Recover & Grow',muscle:'rest',image:IMG.rest,exercises:[]},
 {title:'Rest Day',focus:'Recover & Grow',muscle:'rest',image:IMG.rest,exercises:[]},
];

/* ---------------- STATE / STORAGE ---------------- */
const LS_SESSIONS='ironlog-sessions', LS_THEME='ironlog-theme';
const pad=n=>String(n).padStart(2,'0');
const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;};
const weekdayIndex=()=>((new Date().getDay())+6)%7;
function loadSessions(){try{return JSON.parse(localStorage.getItem(LS_SESSIONS))||{};}catch(e){return {};}}
function saveSessions(s){localStorage.setItem(LS_SESSIONS,JSON.stringify(s));}
function getSession(date){return loadSessions()[date]||null;}
function putSession(date,sess){const all=loadSessions();all[date]=sess;saveSessions(all);}

function buildSession(dayIdx,date){
  const day=PLAN[dayIdx];
  const exercises=day.exercises.map(e=>({
    name:e.name,kind:e.kind,target:e.target,
    sets:(e.kind==='break'||e.kind==='cardio')?[]:Array.from({length:e.sets},()=>({weight:null,reps:null,done:false})),
    done:false
  }));
  return {date,weekday:dayIdx,title:day.title,muscle:day.muscle,exercises,completed:false,completed_count:0,
    total_count:exercises.filter(e=>e.kind!=='break').length};
}
function recompute(s){
  const trackable=s.exercises.filter(e=>e.kind!=='break');
  const done=trackable.filter(e=>e.done).length;
  s.completed_count=done;s.total_count=trackable.length;
  s.completed=trackable.length>0&&done===trackable.length;
  return s;
}
function getPrevious(date){
  const all=loadSessions();
  const dates=Object.keys(all).filter(d=>d<date).sort().reverse();
  const wd=(new Date(date+'T00:00:00').getDay()+6)%7;
  const names=PLAN[wd].exercises.filter(e=>e.kind!=='break').map(e=>e.name);
  const res={};
  names.forEach(name=>{
    for(const d of dates){
      const sess=all[d];const m=(sess.exercises||[]).find(x=>x.name===name);
      if(!m)continue;
      const logged=(m.sets||[]).filter(s=>s.weight!=null||s.reps!=null);
      if(logged.length||m.done){res[name]={date:d,sets:logged};break;}
    }
  });
  return res;
}

/* ---------------- THEME ---------------- */
function initTheme(){const t=localStorage.getItem(LS_THEME)||'dark';applyTheme(t);}
function applyTheme(t){document.documentElement.classList.toggle('dark',t==='dark');localStorage.setItem(LS_THEME,t);}
function toggleTheme(){const cur=localStorage.getItem(LS_THEME)||'dark';applyTheme(cur==='dark'?'light':'dark');}

/* ---------------- TOAST ---------------- */
let toastTimer;
function toast(title,sub){
  const el=document.getElementById('toast');
  document.getElementById('toast-icon').innerHTML=`<span style="color:hsl(var(--success))">${icon('trophy',20)}</span>`;
  document.getElementById('toast-title').textContent=title;
  document.getElementById('toast-sub').textContent=sub||'';
  el.classList.add('show');clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3200);
}

/* ---------------- PROGRESS RING ---------------- */
function ringSVG(progress,size,stroke,color){
  const r=(size-stroke)/2,c=2*Math.PI*r,off=c-Math.min(progress,1)*c;
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="hsl(var(--muted))" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)"/>
  </svg>`;
}
function ringWithLabel(progress,size,stroke,color){
  return `<div style="position:relative;display:inline-flex;align-items:center;justify-content:center;width:${size}px;height:${size}px">
    ${ringSVG(progress,size,stroke,color)}
    <span class="display" style="position:absolute;font-size:${size*0.28}px;color:${color}">${Math.round(progress*100)}</span></div>`;
}

/* ---------------- NAV ---------------- */
let currentTab='today';
const TABS=[
  {id:'today',icon:'dumbbell',label:'Today'},
  {id:'week',icon:'calendar',label:'Week'},
  {id:'history',icon:'flame',label:'History'},
  {id:'settings',icon:'settings',label:'Settings'},
];
function renderNav(){
  document.getElementById('nav').innerHTML=TABS.map(t=>`
    <button class="nav-btn ${t.id===currentTab?'active':''}" onclick="switchTab('${t.id}')">
      <span class="bar"></span>${icon(t.icon,22)}<span class="lbl">${t.label}</span>
    </button>`).join('');
}
function switchTab(id){currentTab=id;renderNav();render();window.scrollTo(0,0);}

/* ---------------- RENDER ---------------- */
function render(){
  const v=document.getElementById('view');
  v.className='fade';
  if(currentTab==='today')renderToday(v);
  else if(currentTab==='week')renderWeek(v);
  else if(currentTab==='history')renderHistory(v);
  else if(currentTab==='settings')renderSettings(v);
  // retrigger fade
  v.classList.remove('fade');void v.offsetWidth;v.classList.add('fade');
}

/* ---- TODAY ---- */
let todaySession=null, todayPrev={}, saveTimer=null, wasComplete=false;
function persistToday(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>putSession(todaySession.date,todaySession),400);}
function updateProgress(){
  recompute(todaySession);
  const p=todaySession.total_count?todaySession.completed_count/todaySession.total_count:0;
  const ring=document.getElementById('today-ring');
  if(ring)ring.innerHTML=ringWithLabel(p,56,5,'hsl(var(--primary))');
  const cnt=document.getElementById('today-count');
  if(cnt)cnt.textContent=`${todaySession.completed_count} / ${todaySession.total_count} exercises done`;
  const banner=document.getElementById('complete-banner');
  if(banner)banner.style.display=todaySession.completed?'flex':'none';
  if(todaySession.completed&&!wasComplete){wasComplete=true;toast('Workout crushed!','Logged to your history. Great work.');}
  if(!todaySession.completed)wasComplete=false;
}
function renderToday(v){
  const wd=weekdayIndex(),date=todayStr(),day=PLAN[wd];
  const saved=getSession(date);
  todaySession=(saved&&saved.exercises&&saved.exercises.length)?saved:buildSession(wd,date);
  recompute(todaySession);wasComplete=todaySession.completed;
  todayPrev=getPrevious(date);
  const isRest=day.exercises.length===0;
  const p=todaySession.total_count?todaySession.completed_count/todaySession.total_count:0;

  let html=`<div class="hero">
    <img src="${day.image}" alt="${day.title}"/><div class="ov"></div>
    <div class="top">
      <div><div class="eyebrow">${DAY_NAMES[wd]}</div><div class="muted" style="font-size:12px;margin-top:4px;font-weight:600">${day.focus}</div></div>
      ${isRest?'':`<div class="ring-wrap" id="today-ring">${ringWithLabel(p,56,5,'hsl(var(--primary))')}</div>`}
    </div>
    <div class="bot"><h1 class="display">${day.title}</h1>
      ${isRest?'':`<div id="today-count" style="color:rgba(255,255,255,.8);font-size:14px;font-weight:600;margin-top:8px">${todaySession.completed_count} / ${todaySession.total_count} exercises done</div>`}
    </div>
  </div><div class="px" style="margin-top:24px">`;

  if(isRest){
    html+=`<div style="text-align:center;padding:64px 0" class="fade">
      <div style="color:hsl(var(--primary));display:flex;justify-content:center;margin-bottom:16px">${icon('flame',48)}</div>
      <h2 class="display" style="font-size:36px;text-transform:uppercase">Rest Day</h2>
      <p class="muted" style="font-size:14px;margin-top:8px;max-width:280px;margin-left:auto;margin-right:auto">Muscles grow when you recover. Hydrate, stretch, and come back stronger tomorrow.</p>
    </div>`;
  }else{
    html+=`<div id="complete-banner" class="banner" style="display:${todaySession.completed?'flex':'none'}">
      <span style="color:hsl(var(--success))">${icon('trophy',24)}</span>
      <div><div class="t">Session Complete</div><div class="s">Nice — this counts toward your streak.</div></div></div>`;
    html+=`<div class="stack" id="ex-list"></div>`;
  }
  html+=`</div>`;
  v.innerHTML=html;
  if(!isRest)buildCards();
}
function summaryStr(prev){if(!prev||!prev.sets.length)return null;return prev.sets.map(s=>`${s.weight!=null?s.weight+'kg':'—'}×${s.reps!=null?s.reps:'—'}`).join('  ·  ');}
function relDay(iso){const then=new Date(iso+'T00:00:00'),now=new Date();const days=Math.round((now.setHours(0,0,0,0)-then.setHours(0,0,0,0))/864e5);if(days<=0)return'today';if(days===1)return'yesterday';if(days<7)return days+'d ago';return then.toLocaleDateString(undefined,{month:'short',day:'numeric'});}
function buildCards(){
  const list=document.getElementById('ex-list');
  todaySession.exercises.forEach((exr,i)=>{
    const el=document.createElement('div');
    if(exr.kind==='break'){
      el.innerHTML=`<button class="breakbtn" >${icon('timer',16)} Start Rest Timer</button>`;
      el.querySelector('button').onclick=openTimer;
      list.appendChild(el);return;
    }
    const simple=exr.kind==='cardio';
    const prev=todayPrev[exr.name];const summ=summaryStr(prev);
    el.className='card'+(exr.done?' done':'');el.dataset.idx=i;
    let inner=`<div class="ex-head"><span style="color:${exr.done?'hsl(var(--success))':'hsl(var(--primary))'}">${icon(simple?'waves':'dumbbell',16)}</span><div style="min-width:0"><div class="ex-name">${exr.name}</div></div></div><div class="ex-target">${exr.target}</div>`;
    if(summ)inner+=`<div class="prev-hint">${icon('trendingUp',14)}<span>Last ${relDay(prev.date)}: <span class="v">${summ}</span></span></div>`;
    if(simple){
      inner+=`<button class="simplebtn ${exr.done?'on':''}">${icon('check',20)} ${exr.done?'Completed':'Mark Done'}</button>`;
      el.innerHTML=inner;
      el.querySelector('.simplebtn').onclick=()=>{exr.done=!exr.done;el.querySelector('.simplebtn').classList.toggle('on',exr.done);el.querySelector('.simplebtn').innerHTML=`${icon('check',20)} ${exr.done?'Completed':'Mark Done'}`;el.classList.toggle('done',exr.done);updateProgress();persistToday();};
    }else{
      inner+=`<div style="display:flex;flex-direction:column;gap:8px;margin-top:12px">`;
      exr.sets.forEach((st,si)=>{
        const ps=prev&&prev.sets[si];
        inner+=`<div class="setrow" data-si="${si}">
          <span class="setnum">${si+1}</span>
          <div style="flex:1;display:flex;align-items:center;gap:8px">
            <div class="setcell"><input type="number" inputmode="decimal" class="w" placeholder="${ps&&ps.weight!=null?ps.weight:'kg'}" value="${st.weight??''}"/></div>
            <span class="xsign">×</span>
            <div class="setcell"><input type="number" inputmode="numeric" class="r" placeholder="${ps&&ps.reps!=null?ps.reps:'reps'}" value="${st.reps??''}"/></div>
          </div>
          <button class="checkbtn ${st.done?'on':''}">${icon('check',20)}</button></div>`;
      });
      inner+=`</div>`;el.innerHTML=inner;
      el.querySelectorAll('.setrow').forEach(row=>{
        const si=+row.dataset.si;const st=exr.sets[si];
        row.querySelector('.w').oninput=e=>{st.weight=e.target.value===''?null:parseFloat(e.target.value);persistToday();};
        row.querySelector('.r').oninput=e=>{st.reps=e.target.value===''?null:parseInt(e.target.value);persistToday();};
        row.querySelector('.checkbtn').onclick=()=>{
          st.done=!st.done;row.querySelector('.checkbtn').classList.toggle('on',st.done);
          exr.done=exr.sets.every(s=>s.done);el.classList.toggle('done',exr.done);
          updateProgress();persistToday();
        };
      });
    }
    list.appendChild(el);
  });
}

/* ---- REST TIMER ---- */
let timerInt=null;
function openTimer(){
  let remaining=90;
  const ov=document.createElement('div');ov.className='overlay';ov.id='timer-ov';
  function tpl(){
    const mins=pad(Math.floor(remaining/60)),secs=pad(remaining%60);
    const danger=remaining<=5&&remaining>0,done=remaining===0;
    return `<div style="width:100%;max-width:360px;text-align:center">
      <div class="eyebrow" style="margin-bottom:16px;display:flex;justify-content:center;gap:8px;align-items:center">${icon('flame',16)} ${done?'Back to it':'Rest'}</div>
      <div class="timer-num ${danger?'danger pop':''} ${done?'done':''}">${done?'GO':mins+':'+secs}</div>
      <div class="timer-actions">
        <button class="btn-ghost" id="add10">${icon('plus',20)} 10s</button>
        <button class="btn-primary" id="skip">${icon('x',20)} ${done?'Close':'Skip'}</button>
      </div></div>`;
  }
  function redraw(){ov.innerHTML=tpl();ov.querySelector('#add10').onclick=()=>{remaining+=10;redraw();};ov.querySelector('#skip').onclick=close;}
  function close(){clearInterval(timerInt);ov.remove();}
  redraw();document.body.appendChild(ov);
  timerInt=setInterval(()=>{if(remaining<=1){remaining=0;clearInterval(timerInt);try{navigator.vibrate&&navigator.vibrate([200,100,200]);}catch(e){}redraw();return;}remaining--;redraw();},1000);
}

/* ---- WEEK ---- */
let weekSel=weekdayIndex();
function renderWeek(v){
  const day=PLAN[weekSel];
  let pills=PLAN.map((d,i)=>{const rest=d.exercises.length===0;return `<button class="pill ${i===weekSel?'active':''}" onclick="weekSel=${i};render()"><span class="d">${SHORT[i]}</span>${rest?`<span style="opacity:.6">${icon('moon',14)}</span>`:'<span class="dot"></span>'}</button>`;}).join('');
  let ex='';
  if(day.exercises.length===0){ex=`<p class="muted" style="font-size:14px;padding:32px 0;text-align:center">Recovery day — no exercises scheduled.</p>`;}
  else{ex='<div class="stack">'+day.exercises.map(e=>{
    if(e.kind==='break')return `<div class="breaklabel">${icon('timer',14)} Short Break</div>`;
    return `<div class="exrow"><div class="l"><span style="color:hsl(var(--primary))">${icon(e.kind==='cardio'?'waves':'dumbbell',16)}</span><span class="n">${e.name}</span></div><span class="r">${e.sets>1?e.sets+' × ':''}${e.target}</span></div>`;
  }).join('')+'</div>';}
  v.innerHTML=`<div class="px" style="padding-top:32px">
    <div class="eyebrow">The Split</div><h1 class="display" style="font-size:48px;text-transform:uppercase;line-height:1;margin-top:4px">Weekly Plan</h1>
    <div class="no-sb" style="display:flex;gap:8px;margin-top:24px;overflow-x:auto">${pills}</div>
    <div style="margin-top:24px" class="fade">
      <div class="wk-hero"><img src="${day.image}"/><div class="ov"></div><div class="cap"><div class="eyebrow">${DAY_NAMES[weekSel]}</div><h2>${day.title}</h2></div></div>
      ${ex}
    </div></div>`;
}

/* ---- HISTORY ---- */
function computeStats(){
  const all=loadSessions();
  const doneDates=new Set(Object.values(all).filter(s=>s.completed).map(s=>s.date));
  const today=new Date();today.setHours(0,0,0,0);
  const iso=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  // streak
  let streak=0;let cur=new Date(today);
  for(let k=0;k<60;k++){
    const wd=(cur.getDay()+6)%7;
    if(wd<5){if(doneDates.has(iso(cur)))streak++;else if(iso(cur)===iso(today)){}else break;}
    cur.setDate(cur.getDate()-1);
  }
  // week
  const monday=new Date(today);monday.setDate(today.getDate()-((today.getDay()+6)%7));
  const grid=[];let weekDone=0;
  for(let i=0;i<5;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);const done=doneDates.has(iso(d));if(done)weekDone++;grid.push({wd:i,done});}
  return {streak,weekDone,grid,total:doneDates.size,sessions:Object.values(all).sort((a,b)=>b.date<a.date?-1:1)};
}
function fmtDate(iso){const d=new Date(iso+'T00:00:00');return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});}
function renderHistory(v){
  const s=computeStats();
  const DAYS=['Mon','Tue','Wed','Thu','Fri'];
  let sessions=s.sessions.length===0?`<p class="muted" style="font-size:14px;padding:32px 0;text-align:center">No workouts logged yet. Head to Today and start lifting! 💪</p>`:
    '<div class="stack">'+s.sessions.map(x=>`<div class="hitem"><div style="min-width:0"><div style="font-weight:700;font-size:14px">${x.title}</div><div class="muted" style="font-size:12px">${fmtDate(x.date)}</div></div><div style="display:flex;align-items:center;gap:8px"><span class="muted" style="font-size:12px;font-weight:700">${x.completed_count}/${x.total_count}</span><span class="badge ${x.completed?'on':''}">${x.completed?'Done':'Partial'}</span></div></div>`).join('')+'</div>';
  v.innerHTML=`<div class="px" style="padding-top:32px">
    <div class="eyebrow">Progress</div><h1 class="display" style="font-size:48px;text-transform:uppercase;line-height:1;margin-top:4px">History</h1>
    <div class="statgrid">
      <div class="stat"><span style="color:hsl(var(--primary))">${icon('flame',20)}</span><span class="v">${s.streak}</span><span class="l">Day Streak</span></div>
      <div class="stat"><span style="color:hsl(var(--primary))">${icon('trophy',20)}</span><span class="v">${s.weekDone}/5</span><span class="l">This Week</span></div>
      <div class="stat"><span style="color:hsl(var(--primary))">${icon('dumbbell',20)}</span><span class="v">${s.total}</span><span class="l">Total Done</span></div>
    </div>
    <div class="wkgrid"><div class="l" style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;color:hsl(var(--muted-foreground));margin-bottom:12px">This Week</div>
      <div class="row">${s.grid.map((g,i)=>`<div class="col"><span class="dl">${DAYS[i]}</span><div class="circle ${g.done?'on':''}">${g.done?icon('check',20):'<span style="width:6px;height:6px;border-radius:99px;background:hsl(var(--muted-foreground)/.4)"></span>'}</div></div>`).join('')}</div>
    </div>
    <h2 class="display" style="font-size:24px;text-transform:uppercase;margin-top:32px;margin-bottom:12px">Recent Sessions</h2>
    ${sessions}
  </div>`;
}

        <div style="display:flex;align-items:center;gap:12px">
          <span style="color:hsl(var(--primary))">${icon(dark?'moon':'sun',20)}</span>
          <div><div style="font-weight:700;font-size:14px">${dark?'Dark Mode':'Light Mode'}</div><div class="muted" style="font-size:12px">Tap to switch theme</div></div>
        </div>
        <button class="toggle ${dark?'on':''}" id="theme-toggle"><span class="knob">${icon(dark?'moon':'sun',16)}</span></button>
      </div>
    </div>
    <div class="card" style="margin-top:12px;padding:20px">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:44px;height:44px;border-radius:12px;background:hsl(var(--primary));display:flex;align-items:center;justify-content:center;color:hsl(var(--primary-foreground))">${icon('dumbbell',24)}</div>
        <div><div class="display" style="font-size:24px;text-transform:uppercase;line-height:1">Iron Log</div><div class="muted" style="font-size:12px;margin-top:4px">Your personal training companion</div></div>
      </div>
      <div style="margin-top:16px;padding-top:16px;border-top:1px solid hsl(var(--border));display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:12px" class="muted">
        <div><div style="font-weight:700;color:hsl(var(--foreground))">5-Day Split</div><div>Push / Pull / Legs blend</div></div>
        <div><div style="font-weight:700;color:hsl(var(--foreground))">Saved on device</div><div>Works fully offline</div></div>
      </div>
    </div>
    <p class="muted" style="text-align:center;font-size:12px;margin-top:32px;display:flex;align-items:center;justify-content:center;gap:4px">Built with <span style="color:hsl(var(--primary))">${icon('heart',12)}</span> for the grind</p>
  </div>`;
  document.getElementById('theme-toggle').onclick=()=>{toggleTheme();renderSettings(v);};
}

/* ---------------- INIT ---------------- */
initTheme();renderNav();render();
</script>
